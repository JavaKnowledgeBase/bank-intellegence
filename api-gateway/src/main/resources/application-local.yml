spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/cibap
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: agent-route
              uri: http://localhost:8080
              predicates:
                - Path=/api/v1/agent/**
              filters:
                - CircuitBreaker=name=orchestration,fallbackUri=/fallback/agent

            - id: accounts-route
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/accounts/**
              filters:
                - CircuitBreaker=name=customer-agent,fallbackUri=/fallback/accounts

            - id: fraud-route
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/fraud/**
              filters:
                - CircuitBreaker=name=fraud-detection,fallbackUri=/fallback/fraud

            - id: loans-route
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/loans/**
              filters:
                - CircuitBreaker=name=loan-prescreen,fallbackUri=/fallback/loans

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG
    com.jpmc.cibap.gateway: DEBUG
