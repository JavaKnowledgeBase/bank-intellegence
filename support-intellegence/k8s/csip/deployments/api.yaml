apiVersion: apps/v1
kind: Deployment
metadata:
  name: csip-api
  namespace: csip
  labels:
    app: csip-api
    version: "2.0.0"
    app.kubernetes.io/part-of: csip
spec:
  replicas: 3
  selector:
    matchLabels:
      app: csip-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 2
  template:
    metadata:
      labels:
        app: csip-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8092"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: csip-backend
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: csip-api
      containers:
      - name: csip-api
        image: jpmc-ecr/csip-backend:2.0.0
        ports:
        - containerPort: 8092
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: VAULT_ADDR
          value: "https://vault.jpmc.internal"
        - name: VAULT_BYPASS
          value: "false"
        - name: AUTH_BYPASS
          value: "false"
        - name: OTEL_ENABLED
          value: "true"
        - name: OTEL_ENDPOINT
          value: "http://otel-collector.observability:4317"
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka.cibap:9092"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /api/v1/system/health
            port: 8092
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/system/health
            port: 8092
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: csip-api
  namespace: csip
spec:
  selector:
    app: csip-api
  ports:
  - port: 8092
    targetPort: 8092
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: csip-api
  namespace: csip
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: csip-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: csip-api-pdb
  namespace: csip
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: csip-api
