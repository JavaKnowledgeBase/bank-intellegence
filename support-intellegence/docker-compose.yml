networks:
  cibap-network:
    external: true
    name: cibap_default   # Network created by /cibap/docker-compose.yml

services:

  # ── CSIP Backend ────────────────────────────────────────────────────────────
  csip-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: csip-backend
    ports:
      - "8092:8092"
    environment:
      ENVIRONMENT: development
      # Uses hostnames of containers on cibap_default network
      DATABASE_URL: postgresql+asyncpg://cibap_user:changeme@cibap-postgres:5432/cibap
      REDIS_URL: redis://cibap-redis:6379
      KAFKA_BOOTSTRAP_SERVERS: cibap-kafka:29092
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      VECTOR_STORE_BACKEND: chromadb
      CHROMADB_PATH: /app/data/chromadb
      AUTH_BYPASS: "true"
      VAULT_BYPASS: "true"
      OTEL_ENABLED: "false"
      LOG_LEVEL: INFO
    volumes:
      - csip-audit-logs:/app/audit_logs
      - csip-chromadb:/app/data/chromadb
    networks:
      - cibap-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/api/v1/system/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ── CSIP Frontend ───────────────────────────────────────────────────────────
  csip-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: csip-frontend
    ports:
      - "3100:80"
    networks:
      - cibap-network
    depends_on:
      csip-backend:
        condition: service_healthy
    restart: unless-stopped

  # ── CSIP Celery Worker ──────────────────────────────────────────────────────
  csip-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: csip-worker
    command: celery -A workers.celery_app worker --loglevel=info --queues=monitoring,analysis,fix-pipeline --concurrency=4
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://cibap_user:changeme@cibap-postgres:5432/cibap
      REDIS_URL: redis://cibap-redis:6379
      KAFKA_BOOTSTRAP_SERVERS: cibap-kafka:29092
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AUTH_BYPASS: "true"
      VAULT_BYPASS: "true"
    volumes:
      - csip-audit-logs:/app/audit_logs
      - csip-chromadb:/app/data/chromadb
    networks:
      - cibap-network
    depends_on:
      csip-backend:
        condition: service_healthy
    restart: unless-stopped

  # ── CSIP Celery Beat ────────────────────────────────────────────────────────
  csip-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: csip-beat
    command: celery -A workers.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://cibap_user:changeme@cibap-postgres:5432/cibap
      REDIS_URL: redis://cibap-redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AUTH_BYPASS: "true"
      VAULT_BYPASS: "true"
    networks:
      - cibap-network
    depends_on:
      csip-worker:
        condition: service_started
    restart: unless-stopped

volumes:
  csip-audit-logs:
  csip-chromadb:
