server:
  port: 8083

spring:
  application:
    name: loan-prescreen-service

  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/cibap}
    username: ${DB_USERNAME:cibap_user}
    password: ${DB_PASSWORD:changeme}

  flyway:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5432/cibap}
    user: ${DB_USERNAME:cibap_user}
    password: ${DB_PASSWORD:changeme}

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      acks: all
      retries: 3

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:https://auth.chase.internal/realms/cibap}

credit-bureau:
  base-url: ${CREDIT_BUREAU_URL:https://api.experian.mock.internal}
  mock: ${CREDIT_BUREAU_MOCK:true}

resilience4j:
  circuitbreaker:
    instances:
      credit-bureau:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
