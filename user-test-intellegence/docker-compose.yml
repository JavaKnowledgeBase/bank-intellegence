services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ctip
      POSTGRES_USER: ctip
      POSTGRES_PASSWORD: ctip
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctip -d ctip"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "19200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=1s >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  ctip-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8091:8091"
    volumes:
      - ./backend:/app
    environment:
      ENVIRONMENT: development
      FRONTEND_ORIGIN: http://localhost:3200
      DATABASE_URL: postgresql+psycopg://ctip:ctip@postgres:5432/ctip
      TASK_QUEUE_MODE: celery
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SEARCH_BACKEND_MODE: auto
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/api/v1/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  ctip-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A workers.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      ENVIRONMENT: development
      FRONTEND_ORIGIN: http://localhost:3200
      DATABASE_URL: postgresql+psycopg://ctip:ctip@postgres:5432/ctip
      TASK_QUEUE_MODE: celery
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SEARCH_BACKEND_MODE: auto
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      ctip-backend:
        condition: service_healthy

  ctip-frontend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3200"
    ports:
      - "3200:3200"
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_BASE: http://localhost:8091
    depends_on:
      ctip-backend:
        condition: service_healthy

volumes:
  postgres_data:
  elastic_data:
