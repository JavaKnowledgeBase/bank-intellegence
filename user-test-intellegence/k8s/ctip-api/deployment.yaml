apiVersion: apps/v1
kind: Deployment
metadata:
  name: ctip-api
  namespace: ctip
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ctip-api
  template:
    metadata:
      labels:
        app: ctip-api
    spec:
      containers:
        - name: ctip-api
          image: ctip-backend:0.2.0
          ports:
            - containerPort: 8091
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8091
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8091
