server:
  port: 8081

spring:
  application:
    name: customer-agent-service

  # ─── R2DBC (reactive PostgreSQL) ─────────────────────────────────────────
  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/cibap}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:inmind}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m
      # Bound the time a subscription waits for a free connection.
      # Without this, pool exhaustion causes indefinite blocking.
      max-acquire-time: 3s

  # ─── Flyway (blocking JDBC for schema migrations only) ───────────────────
  flyway:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5432/cibap}
    user: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:inmind}
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: false

  # ─── Redis ────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      # Connection timeout — fail fast if Redis pod is unreachable
      connect-timeout: 2s
      # Command timeout — bound individual operation latency
      timeout: 1s
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1

  # ─── Kafka ────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all       # Leader + all ISR must ack — prevents loss on leader failover
      retries: 3      # Producer-level retry for transient network errors
      properties:
        enable.idempotence: true   # Exactly-once delivery on retry
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: customer-agent-cache-invalidation
      auto-offset-reset: earliest
      enable-auto-commit: false    # Manual commit — only ack after Redis eviction completes

  # ─── OAuth2 Resource Server ───────────────────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:https://auth.chase.internal/realms/cibap}
          # JWK Set URI is auto-derived from issuer-uri + /.well-known/openid-configuration
          # Override only if the auth server doesn't expose OIDC discovery
          # jwk-set-uri: ${JWT_JWK_SET_URI:https://auth.chase.internal/realms/cibap/protocol/openid-connect/certs}

# ─── Resilience4j ──────────────────────────────────────────────────────────
#
# Programmatic configuration in Resilience4jConfig.java is the primary source
# for circuit-breaker, retry, and rate-limiter settings. The YAML below provides
# additional Actuator health indicators and metric tags for Prometheus.
#
resilience4j:
  circuitbreaker:
    configs:
      default:
        register-health-indicator: true      # Exposes /actuator/health/circuitBreakers
        record-failure-predicate: com.jpmc.cibap.customer.config.RecordFailurePredicate
    instances:
      redis-cache-cb:
        # Settings here are OVERRIDDEN by Resilience4jConfig.java beans.
        # Kept for Actuator health indicator registration only.
        register-health-indicator: true
      account-db-cb:
        register-health-indicator: true
  retry:
    instances:
      kafka-publish-retry:
        register-health-indicator: true
  ratelimiter:
    instances:
      api-rate-limiter:
        register-health-indicator: true

# ─── Actuator & Observability ─────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,circuitbreakers,retries,ratelimiters
  endpoint:
    health:
      show-details: when-authorized       # Only show full health details with auth
      probes:
        enabled: true                     # Enables /health/liveness and /health/readiness
  health:
    circuitbreakers:
      enabled: true    # Include CB state in /actuator/health
    redis:
      enabled: true
    kafka:
      enabled: true
  metrics:
    tags:
      service: customer-agent-service
      environment: ${ENVIRONMENT:local}
    distribution:
      percentiles-histogram:
        customer.account.summary: true    # Enable histogram for SLO tracking
        customer.transactions.list: true

# ─── OpenAPI / Swagger UI ────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  info:
    title: Customer Agent Service API
    description: Account summary, transaction history, and support request endpoints
    version: 1.0.0
  components:
    security-schemes:
      bearerAuth:
        type: http
        scheme: bearer
        bearer-format: JWT

# ─── Logging ─────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.jpmc.cibap: DEBUG                  # Verbose for our own code in lower envs
    org.springframework.r2dbc: WARN        # Reduce R2DBC wire-level noise
    org.springframework.data.redis: WARN
    io.github.resilience4j: INFO           # CB state transitions
  pattern:
    # Structured JSON logging for log aggregation (Splunk / CloudWatch / ELK)
    console: >
      {"timestamp":"%d{ISO8601}","level":"%p","service":"customer-agent",
       "traceId":"%X{traceId}","spanId":"%X{spanId}",
       "thread":"%t","logger":"%logger{36}","message":"%m"}%n

